inspection.declaration.validation.display.name=宣告驗證
inspection.declaration.validation.description=<html><body>回報無效的 GDShader 宣告。<p>此檢查會檢查宣告層級規則，例如重複的符號、缺少或位置錯誤的 <code>shader_type</code> 宣告、無效的 include 路徑、空結構、重複的陣列大小，以及初始化器型別不相符。</p></body></html>
inspection.expression.validation.display.name=運算式驗證
inspection.expression.validation.description=<html><body>回報無效的 GDShader 運算式。<p>此檢查會檢查運算式與指定型別規則，包括無效的運算子運算元、無效的索引運算式、不相容的三元運算分支，以及對常數和 Uniform 等唯讀值進行指定。</p></body></html>
inspection.function.call.validation.display.name=函式與建構子呼叫驗證
inspection.function.call.validation.description=<html><body>回報無效的函式與建構子呼叫。<p>此檢查會檢查呼叫是否符合已知的函式或建構子簽章。它會回報使用者定義函式、內建函式和型別建構子的引數數量錯誤與引數型別不相容。</p></body></html>
inspection.statement.validation.display.name=陳述式驗證
inspection.statement.validation.description=<html><body>回報無效的 GDShader 陳述式。<p>此檢查會檢查控制流程與陳述式規則，包括回傳值相容性、布林條件、<code>discard</code> 位置，以及位於有效控制流程區塊之外的 <code>break</code> 或 <code>continue</code>。</p></body></html>
inspection.unresolved.reference.display.name=無法解析的參考
inspection.unresolved.reference.description=<html><body>回報無法解析的 GDShader 參考。<p>此檢查會檢查對變數、函式、結構和結構成員的參考。它也會根據接收者型別驗證向量 swizzle。</p></body></html>
inspection.unused.symbol.display.name=未使用的變數或函式
inspection.unused.symbol.description=<html><body>回報未使用的 GDShader 符號。<p>此檢查會回報已宣告但從未被參考的區域變數、常數、參數和輔助函式。<code>fragment</code>、<code>vertex</code> 和 <code>start</code> 等內建處理函式不會被回報為未使用。</p></body></html>
