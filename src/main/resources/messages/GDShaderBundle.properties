inspection.declaration.validation.display.name=Declaration validation
inspection.declaration.validation.description=<html><body>Reports invalid GDShader declarations.<p>This inspection checks declaration-level rules such as duplicate symbols, a missing or misplaced <code>shader_type</code> declaration, invalid include paths, empty structs, repeated array sizes, and initializer type mismatches.</p></body></html>
inspection.expression.validation.display.name=Expression validation
inspection.expression.validation.description=<html><body>Reports invalid GDShader expressions.<p>This inspection checks expression and assignment type rules, including invalid operator operands, invalid indexing expressions, incompatible ternary branches, and assignments to read-only values such as constants and uniforms.</p></body></html>
inspection.function.call.validation.display.name=Function and constructor call validation
inspection.function.call.validation.description=<html><body>Reports invalid function and constructor calls.<p>This inspection checks whether calls match a known function or constructor signature. It reports wrong argument counts and incompatible argument types for user-defined functions, built-in functions, and type constructors.</p></body></html>
inspection.statement.validation.display.name=Statement validation
inspection.statement.validation.description=<html><body>Reports invalid GDShader statements.<p>This inspection checks control-flow and statement rules, including return value compatibility, boolean conditions, <code>discard</code> placement, and <code>break</code> or <code>continue</code> outside valid control-flow blocks.</p></body></html>
inspection.unresolved.reference.display.name=Unresolved reference
inspection.unresolved.reference.description=<html><body>Reports GDShader references that cannot be resolved.<p>This inspection checks references to variables, functions, structs, and struct members. It also validates vector swizzles against the receiver type.</p></body></html>
inspection.unused.symbol.display.name=Unused variable or function
inspection.unused.symbol.description=<html><body>Reports unused GDShader symbols.<p>This inspection reports local variables, constants, parameters, and helper functions that are declared but never referenced. Built-in processing functions such as <code>fragment</code>, <code>vertex</code>, and <code>start</code> are not reported as unused.</p></body></html>
