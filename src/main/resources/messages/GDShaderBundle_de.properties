inspection.declaration.validation.display.name=Deklarationsvalidierung
inspection.declaration.validation.description=<html><body>Meldet ungültige GDShader-Deklarationen.<p>Diese Inspektion prüft Regeln auf Deklarationsebene, zum Beispiel doppelte Symbole, fehlende oder falsch platzierte <code>shader_type</code>-Deklarationen, ungültige Include-Pfade, leere Strukturen, wiederholte Array-Größen und Typkonflikte in Initialisierern.</p></body></html>
inspection.expression.validation.display.name=Ausdrucksvalidierung
inspection.expression.validation.description=<html><body>Meldet ungültige GDShader-Ausdrücke.<p>Diese Inspektion prüft Ausdrucks- und Zuweisungstypregeln, darunter ungültige Operatoroperanden, ungültige Indexausdrücke, inkompatible ternäre Zweige und Zuweisungen an schreibgeschützte Werte wie Konstanten und Uniforms.</p></body></html>
inspection.function.call.validation.display.name=Funktions- und Konstruktoraufrufvalidierung
inspection.function.call.validation.description=<html><body>Meldet ungültige Funktions- und Konstruktoraufrufe.<p>Diese Inspektion prüft, ob Aufrufe zu einer bekannten Funktions- oder Konstruktorsignatur passen. Sie meldet falsche Argumentanzahlen und inkompatible Argumenttypen für benutzerdefinierte Funktionen, eingebaute Funktionen und Typkonstruktoren.</p></body></html>
inspection.statement.validation.display.name=Anweisungsvalidierung
inspection.statement.validation.description=<html><body>Meldet ungültige GDShader-Anweisungen.<p>Diese Inspektion prüft Kontrollfluss- und Anweisungsregeln, darunter Kompatibilität von Rückgabewerten, boolesche Bedingungen, die Platzierung von <code>discard</code> sowie <code>break</code> oder <code>continue</code> außerhalb gültiger Kontrollflussblöcke.</p></body></html>
inspection.unresolved.reference.display.name=Nicht aufgelöste Referenz
inspection.unresolved.reference.description=<html><body>Meldet GDShader-Referenzen, die nicht aufgelöst werden können.<p>Diese Inspektion prüft Referenzen auf Variablen, Funktionen, Strukturen und Struktur-Member. Außerdem validiert sie Vektor-Swizzles gegen den Empfängertyp.</p></body></html>
inspection.unused.symbol.display.name=Nicht verwendete Variable oder Funktion
inspection.unused.symbol.description=<html><body>Meldet nicht verwendete GDShader-Symbole.<p>Diese Inspektion meldet lokale Variablen, Konstanten, Parameter und Hilfsfunktionen, die deklariert, aber nie referenziert werden. Eingebaute Verarbeitungsfunktionen wie <code>fragment</code>, <code>vertex</code> und <code>start</code> werden nicht als unbenutzt gemeldet.</p></body></html>
