inspection.declaration.validation.display.name=선언 유효성 검사
inspection.declaration.validation.description=<html><body>잘못된 GDShader 선언을 보고합니다.<p>중복 심볼, 누락되었거나 잘못 배치된 <code>shader_type</code> 선언, 잘못된 include 경로, 빈 구조체, 반복된 배열 크기, 초기화 값 타입 불일치 같은 선언 수준 규칙을 검사합니다.</p></body></html>
inspection.expression.validation.display.name=표현식 유효성 검사
inspection.expression.validation.description=<html><body>잘못된 GDShader 표현식을 보고합니다.<p>잘못된 연산자 피연산자, 잘못된 인덱싱 표현식, 호환되지 않는 삼항 연산 분기, 상수나 유니폼처럼 읽기 전용 값에 대한 대입 등 표현식과 대입 타입 규칙을 검사합니다.</p></body></html>
inspection.function.call.validation.display.name=함수 및 생성자 호출 유효성 검사
inspection.function.call.validation.description=<html><body>잘못된 함수 및 생성자 호출을 보고합니다.<p>호출이 알려진 함수 또는 생성자 시그니처와 일치하는지 검사합니다. 사용자 정의 함수, 빌트인 함수, 타입 생성자의 잘못된 인수 개수와 호환되지 않는 인수 타입을 보고합니다.</p></body></html>
inspection.statement.validation.display.name=문장 유효성 검사
inspection.statement.validation.description=<html><body>잘못된 GDShader 문장을 보고합니다.<p>반환 값 호환성, 불리언 조건, <code>discard</code> 위치, 유효한 제어 흐름 블록 밖의 <code>break</code> 또는 <code>continue</code> 등 제어 흐름과 문장 규칙을 검사합니다.</p></body></html>
inspection.unresolved.reference.display.name=해결되지 않은 참조
inspection.unresolved.reference.description=<html><body>해결할 수 없는 GDShader 참조를 보고합니다.<p>변수, 함수, 구조체, 구조체 멤버에 대한 참조를 검사합니다. 벡터 swizzle이 대상 타입에 대해 유효한지도 검사합니다.</p></body></html>
inspection.unused.symbol.display.name=사용되지 않는 변수 또는 함수
inspection.unused.symbol.description=<html><body>사용되지 않는 GDShader 심볼을 보고합니다.<p>선언되었지만 참조되지 않는 지역 변수, 상수, 매개변수, 보조 함수를 보고합니다. <code>fragment</code>, <code>vertex</code>, <code>start</code> 같은 빌트인 프로세싱 함수는 사용되지 않음으로 보고하지 않습니다.</p></body></html>
